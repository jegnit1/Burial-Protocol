<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <filter id="glowCyan" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowAmber" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowRed" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" fill="none" stroke="#11212e" stroke-width="1" opacity="0.55"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="#030508"/>
  <rect x="90" y="70" width="1420" height="860" rx="28" fill="#05080d" stroke="#1d2a36" stroke-width="3"/>
  <text x="120" y="115" fill="#e8f2ff" font-family="Consolas, monospace" font-size="28" letter-spacing="3">BURIAL PROTOCOL / NEON MINIMAL ART REFERENCE</text>
  <text x="120" y="148" fill="#8191a4" font-family="Consolas, monospace" font-size="16">dark vertical shaft · square 1U robot · thin mining walls · neon outline blocks · yellow particle mining feedback</text>

  <!-- main gameplay frame -->
  <rect x="420" y="150" width="760" height="760" fill="#010205" stroke="#334250" stroke-width="2"/>
  <rect x="420" y="150" width="760" height="760" fill="url(#grid)" opacity="0.55"/>

  <!-- walls: 10U left/right impression, thin line style -->
  <g opacity="0.96">
    <rect x="420" y="150" width="250" height="760" fill="#05090d" stroke="#6f7c87" stroke-width="2"/>
    <rect x="930" y="150" width="250" height="760" fill="#05090d" stroke="#6f7c87" stroke-width="2"/>
    <path d="M670 150V910M930 150V910" stroke="#dce6ef" stroke-width="2" opacity="0.72"/>
    <path d="M452 185h58M540 248h34M464 315h78M570 390h42M476 504h52M548 640h65M445 768h74" stroke="#8f9ba7" stroke-width="2" opacity="0.7"/>
    <path d="M1080 202h52M970 282h70M1050 374h65M960 520h45M1092 610h42M990 746h82" stroke="#8f9ba7" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- mining particles and highlighted wall cracks -->
  <g filter="url(#glowAmber)">
    <path d="M667 510l-24 12 17 14-28 10" stroke="#ffd45f" stroke-width="3" fill="none"/>
    <path d="M933 600l31-10-14-18 32-13" stroke="#ffd45f" stroke-width="3" fill="none"/>
    <circle cx="650" cy="495" r="3" fill="#ffe68a"/><circle cx="636" cy="532" r="2" fill="#ffb72e"/><circle cx="666" cy="552" r="2" fill="#fff0a8"/>
    <circle cx="956" cy="586" r="3" fill="#ffe68a"/><circle cx="980" cy="558" r="2" fill="#ffb72e"/><circle cx="944" cy="622" r="2" fill="#fff0a8"/>
  </g>

  <!-- center shaft -->
  <rect x="670" y="150" width="260" height="760" fill="#010306" stroke="#243443" stroke-width="1"/>
  <path d="M670 150V910M930 150V910" stroke="#e8f2ff" stroke-width="2" opacity="0.85"/>

  <!-- falling blocks, neon outlines only -->
  <g fill="none" stroke-linejoin="round">
    <rect x="704" y="215" width="64" height="64" stroke="#52e2ff" stroke-width="4" filter="url(#glowCyan)"/>
    <rect x="800" y="280" width="128" height="64" stroke="#ffcc44" stroke-width="4" filter="url(#glowAmber)"/>
    <rect x="704" y="370" width="64" height="128" stroke="#ff4f68" stroke-width="4" filter="url(#glowRed)"/>
    <rect x="832" y="425" width="64" height="64" stroke="#bc72ff" stroke-width="4" filter="url(#glowCyan)"/>
    <path d="M716 228h18M748 265h9M813 292h24M884 333h22M717 389h16M849 439h12" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
  </g>

  <!-- sand particle pile -->
  <g filter="url(#glowAmber)">
    <circle cx="702" cy="805" r="3" fill="#ffd45f"/><circle cx="719" cy="808" r="3" fill="#f4b93c"/><circle cx="736" cy="804" r="2" fill="#ffe680"/><circle cx="755" cy="815" r="3" fill="#ffd45f"/><circle cx="776" cy="805" r="2" fill="#f7c24a"/><circle cx="795" cy="818" r="3" fill="#ffd45f"/><circle cx="815" cy="810" r="2" fill="#ffe680"/><circle cx="836" cy="816" r="3" fill="#f4b93c"/><circle cx="860" cy="807" r="2" fill="#ffd45f"/><circle cx="890" cy="815" r="3" fill="#f4b93c"/>
    <circle cx="724" cy="842" r="3" fill="#ffd45f"/><circle cx="747" cy="846" r="2" fill="#f4b93c"/><circle cx="770" cy="840" r="3" fill="#ffe680"/><circle cx="793" cy="850" r="2" fill="#ffd45f"/><circle cx="820" cy="844" r="3" fill="#f4b93c"/><circle cx="846" cy="852" r="3" fill="#ffd45f"/><circle cx="874" cy="842" r="2" fill="#ffe680"/>
  </g>

  <!-- square 1U player robot -->
  <g transform="translate(770 645)" filter="url(#glowCyan)">
    <rect x="0" y="0" width="72" height="68" rx="8" fill="#f4f8ff" stroke="#0a111a" stroke-width="4"/>
    <rect x="14" y="16" width="44" height="24" rx="5" fill="#07111d" stroke="#8af4ff" stroke-width="2"/>
    <circle cx="28" cy="28" r="4" fill="#78f7ff"/><circle cx="44" cy="28" r="4" fill="#78f7ff"/>
    <rect x="10" y="66" width="16" height="10" fill="#d7e4ee"/><rect x="46" y="66" width="16" height="10" fill="#d7e4ee"/>
  </g>

  <!-- orbit modules -->
  <g filter="url(#glowCyan)">
    <circle cx="738" cy="650" r="7" fill="#ffcc44"/><circle cx="862" cy="646" r="7" fill="#52e2ff"/><rect x="797" y="604" width="13" height="13" fill="#ff4f68" transform="rotate(45 803.5 610.5)"/>
  </g>

  <!-- attacks -->
  <g fill="none" stroke-linecap="round">
    <path d="M842 667 C910 625 950 560 962 490" stroke="#52e2ff" stroke-width="5" filter="url(#glowCyan)"/>
    <path d="M809 640L895 575" stroke="#ff4f68" stroke-width="4" filter="url(#glowRed)"/>
    <path d="M790 636L742 562" stroke="#ffcc44" stroke-width="4" filter="url(#glowAmber)"/>
  </g>

  <!-- left notes -->
  <g font-family="Consolas, monospace">
    <rect x="125" y="190" width="250" height="190" rx="16" fill="#071018" stroke="#334250"/>
    <text x="150" y="230" fill="#e8f2ff" font-size="20">PLAYER SCALE</text>
    <text x="150" y="265" fill="#93a5b8" font-size="15">1U = 64px</text>
    <text x="150" y="292" fill="#93a5b8" font-size="15">robot silhouette: square</text>
    <text x="150" y="319" fill="#93a5b8" font-size="15">not tall / not human</text>
    <text x="150" y="346" fill="#52e2ff" font-size="15">orbit modules as icons</text>

    <rect x="125" y="420" width="250" height="205" rx="16" fill="#071018" stroke="#334250"/>
    <text x="150" y="460" fill="#e8f2ff" font-size="20">WALL STYLE</text>
    <text x="150" y="495" fill="#93a5b8" font-size="15">thin gray/white outline</text>
    <text x="150" y="522" fill="#93a5b8" font-size="15">subcell damage cracks</text>
    <text x="150" y="549" fill="#ffd45f" font-size="15">yellow mining particles</text>
    <text x="150" y="576" fill="#93a5b8" font-size="15">avoid heavy filled wall</text>
  </g>

  <!-- right notes -->
  <g font-family="Consolas, monospace">
    <rect x="1225" y="190" width="250" height="210" rx="16" fill="#071018" stroke="#334250"/>
    <text x="1250" y="230" fill="#e8f2ff" font-size="20">BLOCK STYLE</text>
    <text x="1250" y="265" fill="#93a5b8" font-size="15">neon outline only</text>
    <text x="1250" y="292" fill="#93a5b8" font-size="15">material = color</text>
    <text x="1250" y="319" fill="#93a5b8" font-size="15">small corner highlights</text>
    <text x="1250" y="346" fill="#ff4f68" font-size="15">hit flash on impact</text>

    <rect x="1225" y="445" width="250" height="220" rx="16" fill="#071018" stroke="#334250"/>
    <text x="1250" y="485" fill="#e8f2ff" font-size="20">EFFECT RULE</text>
    <text x="1250" y="520" fill="#93a5b8" font-size="15">Line2D / particles</text>
    <text x="1250" y="547" fill="#93a5b8" font-size="15">short timing, strong flash</text>
    <text x="1250" y="574" fill="#93a5b8" font-size="15">Godot procedural FX</text>
    <text x="1250" y="601" fill="#52e2ff" font-size="15">Aseprite only for icons</text>
  </g>
</svg>
